<!DOCTYPE html>
<html>
<head>
  <title>Liste d'invités</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f4f6;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }

    #guest-name {
      padding: 10px;
      width: 80%;
      margin-bottom: 10px;
    }

    #add-btn {
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
    }

    #guest-container div {
      margin: 5px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .back {
      display: block;
      margin-top: 20px;
      color: blue;
      text-decoration: none;
    }
  </style>

</head>

<body>

<div class="container" id="guest-app">

  <h1 id="title">Ma liste d'invités 🎉</h1>

  <!-- input nom -->
  <input id="guest-name" placeholder="Nom">

  <!-- radio bouton -->
  <div id="gender-selection">
    <label>
      <input type="radio" id="gender-female" name="gender" value="f">
      Fille
    </label>

    <label>
      <input type="radio" id="gender-male" name="gender" value="m">
      Garçon
    </label>

    <label>
      <input type="radio" id="gender-neutral" name="gender" value="n" checked>
      Non genré
    </label>
  </div>

  <!-- bouton ajouter -->
  <button id="add-btn" onclick="addGuest()">Ajouter</button>
  <button id="invite-all-btn" onclick="inviteAll()">❤️</button>

  <!-- liste -->
  <div id="guest-container"></div>
  <p id="invite-all-message" style="
  display:none;
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  background-color:#fce7f3;
  color:#e4238d;
  font-weight:bold;">
  Trop tard, la Terre entière 🌍 est invitée ! <br> Il va falloir plus de bonbons ❤️🍬
</p>

  <!-- légende -->
  <p id="legend">
    <span id="legend-female" style="color: purple;">Fille</span> | 
    <span id="legend-male" style="color: green;">Garçon</span> | 
    <span id="legend-neutral" style="color: black;">Non genré</span>
  </p>

  <!-- retour -->
  <a href="../../index.html" style="display:block; margin-top:20px; color:blue;">
  ⬅ Retour à l'accueil
  </a>

</div>

<!-- script -->
<script src="../scripts/script_guest.js"></script>

</body>
</html>
